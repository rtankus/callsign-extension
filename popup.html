<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATC Callsign Finder</title>
  <style>
    input { flex: 1; padding: 10px; font-size: 14px; }
    button { padding: 10px; font-size: 13px; cursor: pointer; }
    .muted { color: #666; font-size: 12px; margin-top: 8px; }
    .status { font-size: 12px; margin: 8px 0; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 10px; margin-top: 10px; }
    .top { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
    .icao { font-weight: 700; letter-spacing: .04em; }
    .callsign { font-size: 16px; font-weight: 700; }
    .name { color: #333; margin-top: 6px; }
    .country { color: #666; font-size: 12px; margin-top: 2px; }
    .score { color: #666; font-size: 12px; }
    .pill { display:inline-block; border:1px solid #ddd; border-radius: 999px; padding: 2px 8px; font-size: 12px; color:#444; }
    .error { color: #b00020; }
    .footer { margin-top: 10px; display:flex; justify-content: space-between; align-items:center; gap: 8px; }
    .small { font-size: 12px; }
    :root {
  --bg: #0b0f14;
  --panel: #121922;
  --panel-soft: #16202c;
  --accent: #3b82f6;
  --accent-soft: rgba(59,130,246,.15);
  --text-main: #e6edf3;
  --text-dim: #8ea3b8;
  --border: rgba(255,255,255,.08);
}

body {
  margin: 0;
  padding: 16px;
  background: var(--bg);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color: var(--text-main);

  width: 340px;          /* SAFE width */
  box-sizing: border-box;
}

/* Section titles */
.section-label {
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
  margin-top: 18px;
}

/* Input wrapper */
.input-group {
  position: relative;
  margin-bottom: 6px;
}

/* Inputs */
input {
  width: 100%;
  padding: 14px 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text-main);
  font-size: 14px;
  outline: none;
  transition: all .2s ease;
  box-sizing: border-box;
}

input::placeholder {
  color: var(--text-dim);
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  background: var(--panel-soft);
}

/* Ready status */
.status {
  font-size: 13px;
  color: #38d39f;
  margin-top: 12px;
  margin-bottom: 10px;
}

/* Refresh button */
button {
  background: var(--panel);
  color: var(--text-main);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: all .2s ease;
}

button:hover {
  background: var(--panel-soft);
  border-color: var(--accent);
}

button:active {
  transform: scale(0.97);
}

/* Results container */
.results {
  margin-top: 10px;
  max-height: 390px;
  overflow-y: auto;

  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

/* Card */
.result-card {
  position: relative;
  background: #2f4258;  /* brighter */
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 18px;
  transition: all 0.18s ease;
}

.result-card:hover {
  background: #36506b;
  border-color: #6fb6ff;
}

/* ICAO */
.result-model {
  font-size: 22px;
  font-weight: 800;
  color: #ffffff;
}

.result-icao {
  font-size: 12px;
  color: #89c2ff;
}

/* Manufacturer */
.result-manufacturer {
  font-size: 14px;
  font-weight: 600;
  color: #e6f1ff;   /* MUCH brighter */
}

/* Optional: soft label pill */
.result-pill {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  color: #dbe8f7;
  background: rgba(255,255,255,0.05);
}

/* =========================
   COMPACT AIRCRAFT ROWS
========================= */

.result-row {
  display: flex;
  align-items: center;
  gap: 10px;

  padding: 10px 12px;
  margin-bottom: 6px;

  background: #2f4258;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;

  font-size: 13px;
  transition: 0.15s;
}

.result-row:hover {
  background: #36506b;
  border-color: #6fb6ff;
}

/* ICAO */
.r-icao {
  font-weight: 700;
  color: #89c2ff;
  min-width: 50px;
}

/* Model */
.r-model {
  font-weight: 600;
  color: #ffffff;
  flex: 1;
}

/* Manufacturer */
.r-make {
  color: #cfe4ff;
  opacity: 0.8;
  white-space: nowrap;
}

#countryFilter {
  width: 100%;
  padding: 12px 14px;
  margin-top: 8px;

  background: var(--panel);
  color: var(--text-main);

  border: 1px solid var(--border);
  border-radius: 14px;

  font-size: 13px;
  outline: none;
  cursor: pointer;
}

#countryFilter:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  background: var(--panel-soft);
}

.status-pill {
  margin-left: 6px;
  padding: 2px 6px;
  font-size: 10px;
  border-radius: 8px;
  text-transform: uppercase;
}

.status-pill.active {
  background: rgba(80, 200, 120, 0.15);
  color: #4cd964;
}

.status-pill.inactive {
  background: rgba(255, 80, 80, 0.15);
  color: #ff5c5c;
}

.status-pill.unknown {
  background: rgba(200, 200, 200, 0.15);
  color: #aaa;
}

.comments {
  margin-top: 6px;
  font-size: 11px;
  line-height: 1.3;
  opacity: 0.75;
}


.card-topline {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: center;
  margin-bottom: 5px;
}

.code-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.code-pill {
  font-size: 7px;
  font-weight: 800;
  letter-spacing: .06em;
  border-radius: 999px;
  padding: 2px 5px;
}

.icao-pill {
  color: #bfdbfe;
  background: rgba(59,130,246,.18);
  border: 1px solid rgba(96,165,250,.35);
}

.iata-pill {
  color: #fbcfe8;
  background: rgba(236,72,153,.16);
  border: 1px solid rgba(244,114,182,.35);
}

.label {
  font-size: 9px;
  font-weight: 800;
  color: #8ea3b8;
  letter-spacing: .1em;
  text-transform: uppercase;
}

.callsign-main {
  margin-top: 2px;
  font-size: 20px;
  line-height: 1.05;
  font-weight: 900;
  color: #fff;
}


.status-pill {
  font-size: 7.5px;
  padding: 2px 5px;
  border-radius: 999px;
  text-transform: uppercase;
  font-weight: 800;
  white-space: nowrap;
}

.status-pill.active {
  background: rgba(34,197,94,.18);
  color: #86efac;
  border: 1px solid rgba(34,197,94,.35);
}

.status-pill.inactive {
  background: rgba(239,68,68,.18);
  color: #fca5a5;
  border: 1px solid rgba(239,68,68,.35);
}

.status-pill.unknown {
  background: rgba(148,163,184,.16);
  color: #cbd5e1;
  border: 1px solid rgba(148,163,184,.25);
}


.comment-label {
  display: block;
  color: #93c5fd;
  font-size: 8px;
  font-weight: 900;
  letter-spacing: .1em;
  margin-bottom: 3px;
}

body {
  padding: 10px;
  width: 340px;
}

.section-label {
  font-size: 9px;
  letter-spacing: .09em;
  margin-top: 9px;
  margin-bottom: 3px;
}

.input-group {
  margin-bottom: 4px;
}

input,
#countryFilter {
  height: 34px;
  padding: 7px 10px;
  border-radius: 10px;
  font-size: 12px;
}

#countryFilter {
  margin-top: 5px;
}

.status {
  font-size: 11px;
  margin: 7px 0;
}

button {
  padding: 7px 10px;
  border-radius: 10px;
  font-size: 12px;
}

.comment-header {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .1em;
  color: #7dd3fc;
  margin-bottom: 4px;
}

.comment-body {
  font-size: 11px;
  line-height: 1.35;
  color: #cbd5e1;
}

.callsign-card {
  background: linear-gradient(145deg, #172234, #0f1724);
  border: 1px solid rgba(148,163,184,.18);
  border-radius: 12px;

  padding: 8px;
  margin: 0;

  box-shadow: 0 4px 10px rgba(0,0,0,.25);
}


.icao-pill {
  background: rgba(59,130,246,.18);
  color: #bfdbfe;
}

.iata-pill {
  background: rgba(236,72,153,.18);
  color: #fbcfe8;
}

/* Callsign */
.callsign-main {
  font-size: 14px;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 4px;
}

/* Labels */
.label {
  font-size: 8px;
  letter-spacing: .08em;
  color: #8ea3b8;
}

/* Meta row (company + country inline) */
.meta-row {
  font-size: 10px;
  color: #cbd5e1;
  margin-top: 2px;
}

.meta-sep {
  margin: 0 5px;
  opacity: 0.5;
}

/* Status */
.status-pill {
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 999px;
}

/* Comments */
.comments {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid rgba(148,163,184,.12);

  font-size: 9px;
  line-height: 1.25;
  color: #94a3b8;

  max-height: 32px;
  overflow-y: auto;
}

/* Force non-callsign results full width */
.result-row,
.result-card,
.muted {
  grid-column: 1 / -1;
}

  </style>
</head>
<body>
<div class="section-label">CALLSIGN / ICAO CODE</div>
<div class="input-group">
  <input id="callsignInput" placeholder="DELTA, DAL...">
    <select id="countryFilter">
    <option value="">All countries</option>
  </select>
</div>

<div class="section-label">IATA CODE</div>
<div class="input-group">
  <input id="codeInput" placeholder="DL...">
</div>


<div class="section-label">REGISTRATION</div>
<div class="input-group">
  <input id="regInput" placeholder="N123AB">
</div>

<div class="section-label">AIRCRAFT TYPE</div>
<div class="input-group">
  <input id="typeInput" placeholder="C172 / A320 / Skyhawk">
</div>

<div id="status" class="status">Ready.</div>

<button id="refreshBtn">Refresh Database</button>
<div id="results" class="results"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
